<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AskMe</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f4f6f8;
text-align:center;
padding:30px;
margin:0;
}

.logo{
width:260px;
margin-top:20px;
margin-bottom:20px;
}

.tagline{
font-size:18px;
color:#555;
margin-bottom:30px;
}

input{
width:85%;
padding:16px;
font-size:16px;
border-radius:10px;
border:3px solid #1f2a44;
outline:none;
}

button{
margin-top:18px;
padding:14px 35px;
font-size:16px;
background:#1f2a44;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

.card{
margin-top:30px;
background:white;
padding:22px;
border-radius:12px;
max-width:600px;
margin-left:auto;
margin-right:auto;
box-shadow:0px 3px 10px rgba(0,0,0,0.08);
text-align:left;
}

.level{
font-weight:bold;
color:#1f2a44;
margin-bottom:8px;
font-size:18px;
}

</style>
</head>

<body>

<img src="logo.png" class="logo">

<p class="tagline">Ask anything. Share it.</p>

<input id="question" type="text" placeholder="Ask me anything...">

<br>

<button onclick="askAI()">?</button>

<div class="card">
<div class="level">Simple</div>
<p id="simple">Waiting for your question...</p>
</div>

<div class="card">
<div class="level">Insightful</div>
<p id="insightful">Waiting for your question...</p>
</div>

<div class="card">
<div class="level">Expert</div>
<p id="expert">Waiting for your question...</p>
</div>

<script>

async function askAI(){

const question = document.getElementById("question").value;
const button = document.querySelector("button");

button.disabled = true;

document.getElementById("simple").innerText = "Thinking...";
document.getElementById("insightful").innerText = "Thinking...";
document.getElementById("expert").innerText = "Thinking...";

const response = await fetch("https://api.openai.com/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
Authorization: "Bearer YOUR_API_KEY"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{
role:"system",
content:"Explain the question in three levels: Simple, Insightful, Expert. Return JSON like this: {\"simple\":\"...\",\"insightful\":\"...\",\"expert\":\"...\"}"
},
{
role:"user",
content:question
}
]

})

});

const data = await response.json();

const text = data.choices[0].message.content;

const parsed = JSON.parse(text);

document.getElementById("simple").innerText = parsed.simple;
document.getElementById("insightful").innerText = parsed.insightful;
document.getElementById("expert").innerText = parsed.expert;

button.disabled = false;

}



</script>

</body>
</html>
